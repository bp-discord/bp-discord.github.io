<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BlocPlay — Présentation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* VARIABLES */
:root {
  --bg: #f2f3f5;
  --bg-alt: #ffffff;
  --text: #060607;
  --text-soft: #4f5660;
  --accent: #3ba55d;
  --border: #d4d7dc;
  --radius: 18px;
  --shadow: 0 18px 40px rgba(0,0,0,0.08);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1f22;
    --bg-alt: #313338;
    --text: #f2f3f5;
    --text-soft: #b5bac1;
    --accent: #3ba55d;
    --border: #3f4147;
    --shadow: 0 18px 40px rgba(0,0,0,0.6);
  }
}

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, var(--bg-alt) 0, var(--bg) 55%);
  color: var(--text);
}

/* HEADER */
header {
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: 800;
  color: var(--accent);
}

/* CONTENT */
.container {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: var(--bg-alt);
  padding: 24px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}

.btn {
  padding: 10px 18px;
  border-radius: 999px;
  background: var(--accent);
  color: white;
  text-decoration: none;
  font-weight: 600;
  display: inline-block;
  margin-top: 14px;
}
</style>
</head>
<body>

<header>BlocPlay</header>

<div class="container">
  <div class="card">
    <h2>Présentation</h2>
    <p>BlocPlay est le bot officiel du projet BlocPlay.</p>

    <a href="/blocplay/pannel" class="btn">Accéder au panel</a>
  </div>
</div>

</body>
</html>
