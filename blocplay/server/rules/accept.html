<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlocPlay - Acceptation</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #0f172a;
color: white;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
text-align: center;
}

.card {
background: #1e293b;
padding: 30px;
border-radius: 16px;
width: 90%;
max-width: 500px;
}

button {
margin-top: 20px;
padding: 14px 20px;
border: none;
border-radius: 10px;
cursor: pointer;
font-size: 16px;
background: #5865F2;
color: white;
}

button:hover {
background: #4752c4;
}
</style>
</head>

<body>

<div class="card">
<h1>📜 BlocPlay - Règles</h1>

<p id="status">Connexion Discord...</p>

<button id="actionBtn" style="display:none;"></button>
</div>

<script>
const clientId = "1471824801088802879";

// ✔ URL SANS .html
const redirectUri = "https://bp-discord.github.io/blocplay/server/rules/accept";

const guildInvite = "https://discord.gg/TON_INVITE";

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

let inGuild = false;

function login() {
const url =
`https://discord.com/oauth2/authorize?client_id=${clientId}` +
`&response_type=code` +
`&redirect_uri=${encodeURIComponent(redirectUri)}` +
`&scope=identify%20guilds`;

window.location.href = url;
}

function render() {
const btn = document.getElementById("actionBtn");
const status = document.getElementById("status");

if (inGuild) {
status.innerText = "✔ Tu es sur le serveur BlocPlay";

btn.innerText = "✅ Accepter les règles";
btn.onclick = () => {
window.location.href = "https://discord.com/channels/@me";
};

} else {
status.innerText = "❌ Tu n'es pas sur le serveur BlocPlay";

btn.innerText = "🔗 Rejoindre le serveur";
btn.onclick = () => {
window.location.href = guildInvite;
};
}

btn.style.display = "block";
}

async function init() {

if (!code) {
login();
return;
}

// ⚠️ simulation (backend requis pour vrai check)
document.getElementById("status").innerText = "Vérification du compte...";

inGuild = false;

render();
}

init();
</script>

</body>
</html>
