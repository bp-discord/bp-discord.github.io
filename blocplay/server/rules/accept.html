if (inGuild) {

};

btn.onclick = () => {

};
}

}

function login() {
const url =
`https://discord.com/oauth2/authorize?client_id=1471824801088802879&response_type=code&redirect_uri=https%3A%2F%2Fbp-discord.github.io%2Fblocplay%2Fserver%2Frules%2Faccept&scope=identify%20guilds`;
