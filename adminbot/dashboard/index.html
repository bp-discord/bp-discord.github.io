<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>AdminBot – Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/x-icon" href="/logo.ico">

  <style>
    :root {
      --bg: #f2f3f5;
      --bg-alt: #ffffff;
      --bg-soft: #e3e5e8;
      --text: #060607;
      --text-soft: #4f5660;
      --accent: #5865f2;
      --accent-soft: #eef0ff;
      --border: #d4d7dc;
      --card-radius: 18px;
      --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1f22;
        --bg-alt: #313338;
        --bg-soft: #2b2d31;
        --text: #f2f3f5;
        --text-soft: #b5bac1;
        --accent: #5865f2;
        --accent-soft: rgba(88, 101, 242, 0.12);
        --border: #3f4147;
        --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.6);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }

    body {
      background: radial-gradient(circle at top, var(--bg-soft) 0, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background: linear-gradient(to bottom, rgba(0,0,0,0.12), transparent 70%);
      padding: 10px 0 6px;
    }

    .header-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(88,101,242,0.7);
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      border-radius: 999px;
    }

    .brand-text-title { font-size: 16px; font-weight: 700; }
    .brand-text-sub { font-size: 12px; color: var(--text-soft); }

    .btn {
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.18s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 12px 30px rgba(88,101,242,0.7);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 40px rgba(88,101,242,0.9);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-soft);
      border: 1px solid var(--border);
    }

    /* PAGE */
    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 40px 16px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 30px;
    }

    /* TITRES DE SECTIONS */
    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin: 30px 0 10px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }

    /* CARD SERVEUR */
    .card {
      background: var(--bg-alt);
      border-radius: var(--card-radius);
      padding: 18px 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      animation: fadeUp 0.6s ease-out both;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .server-icon {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      background: var(--bg-soft);
      overflow: hidden;
    }

    .server-icon img {
      width: 100%;
      height: 100%;
      border-radius: 16px;
    }

    .server-info {
      flex: 1;
    }

    .server-name {
      font-size: 15px;
      font-weight: 700;
    }

    .server-members {
      font-size: 12px;
      color: var(--text-soft);
      margin-top: 2px;
    }

    .server-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 12px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-logo">
          <img src="/adminbot/logo.png" alt="AdminBot">
        </div>
        <div>
          <div class="brand-text-title">BP Discord</div>
          <div class="brand-text-sub">BP Pannel officiel</div>
        </div>
      </div>

      <div class="header-actions">
        <a class="btn btn-primary" href="/">Accueil</a>
      </div>
    </div>
  </div>

  <!-- PAGE -->
  <div class="page">

    <h1>Dashboard AdminBot</h1>
    <div class="subtitle">Gérez vos serveurs et configurez AdminBot facilement.</div>

    <h2 class="section-title">Serveurs Discord (<span id="totalCount">0</span>)</h2>

    <h3 class="section-title">Configurés (<span id="configuredCount">0</span>)</h3>
    <div id="configured" class="grid"></div>

    <h3 class="section-title">À configurer (<span id="notConfiguredCount">0</span>)</h3>
    <div id="notConfigured" class="grid"></div>

  </div>

  <script>
    const API_URL = "https://TON-PROJET.railway.app/api/servers";

    async function loadServers() {
      const configured = document.getElementById("configured");
      const notConfigured = document.getElementById("notConfigured");

      const totalCount = document.getElementById("totalCount");
      const configuredCount = document.getElementById("configuredCount");
      const notConfiguredCount = document.getElementById("notConfiguredCount");

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const serversConfigured = data.filter(s => s.hasAdminBot);
        const serversNotConfigured = data.filter(s => !s.hasAdminBot);

        totalCount.textContent = data.length;
        configuredCount.textContent = serversConfigured.length;
        notConfiguredCount.textContent = serversNotConfigured.length;

        configured.innerHTML = "";
        notConfigured.innerHTML = "";

        function createCard(server, configured) {
          return `
            <article class="card">
              <div class="server-icon">
                <img src="${server.icon}" alt="">
              </div>

              <div class="server-info">
                <div class="server-name">${server.name}</div>
                <div class="server-members">${server.members} membres</div>
              </div>

              <div class="server-actions">
                ${
                  configured
                    ? `<a href="/adminbot/panel?server=${server.id}" class="btn btn-primary btn-small">Ouvrir</a>`
                    : `<a href="/adminbot/configure?server=${server.id}" class="btn btn-primary btn-small">Configurer</a>`
                }
              </div>
            </article>
          `;
        }

        serversConfigured.forEach(s => {
          configured.innerHTML += createCard(s, true);
        });

        serversNotConfigured.forEach(s => {
          notConfigured.innerHTML += createCard(s, false);
        });

      } catch (err) {
        configured.innerHTML = "<p>Erreur de chargement.</p>";
        notConfigured.innerHTML = "<p>Erreur de chargement.</p>";
      }
    }

    loadServers();
  </script>

</body>
</html>
