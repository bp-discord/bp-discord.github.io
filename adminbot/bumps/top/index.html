<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Bumps – AdminBot</title>

  <style>
    body {
      background: #0d0f12;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
    }

    .server-card {
      background: #1a1d23;
      padding: 15px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 15px;
      border: 1px solid #2a2f38;
      transition: 0.2s;
    }

    .server-card:hover {
      transform: translateY(-2px);
      border-color: #3b4250;
    }

    .rank {
      font-size: 1.6rem;
      font-weight: bold;
      width: 50px;
      text-align: center;
    }

    .info h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .join-btn {
      background: #5865F2;
      padding: 8px 14px;
      border-radius: 6px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      white-space: nowrap;
    }

    .join-btn:hover {
      background: #4752C4;
    }

    .no-invite {
      opacity: 0.5;
      white-space: nowrap;
    }

    .loading, .error {
      text-align: center;
      opacity: 0.7;
    }

    /* TOP 3 */
    .top1 { border-left: 5px solid gold; }
    .top2 { border-left: 5px solid silver; }
    .top3 { border-left: 5px solid #cd7f32; }
  </style>
</head>

<body>

  <header>
    <h1>🏆 Top Bumps – AdminBot</h1>
    <p>Classement des serveurs les plus actifs</p>
  </header>

  <main id="top-list">
    <p class="loading">Chargement du classement…</p>
  </main>

  <script>
    const API_URL = "https://TON-PROJET.railway.app/api/top-bumps";

    async function loadTop() {
      const container = document.getElementById("top-list");

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        container.innerHTML = "";

        data.forEach(server => {
          const card = document.createElement("div");
          card.className = "server-card";

          // TOP 3 couleurs
          if (server.position === 1) card.classList.add("top1");
          if (server.position === 2) card.classList.add("top2");
          if (server.position === 3) card.classList.add("top3");

          card.innerHTML = `
            <div class="rank">#${server.position}</div>

            <div class="info">
              <h2>${server.name}</h2>
              <p>${server.bumps} bumps</p>
            </div>

            <div class="actions">
              ${server.invite 
                ? `<a href="${server.invite}" target="_blank" class="join-btn">Rejoindre</a>`
                : `<span class="no-invite">Pas d'invite</span>`
              }
            </div>
          `;

          container.appendChild(card);
        });

      } catch (err) {
        container.innerHTML = `<p class="error">Impossible de charger les données.</p>`;
      }
    }

    loadTop();
    setInterval(loadTop, 30000); // refresh auto 30s
  </script>

</body>
</html>
