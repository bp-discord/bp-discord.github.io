<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Top Bumps – AdminBot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #f2f3f5;
      --bg-alt: #ffffff;
      --bg-soft: #e3e5e8;
      --text: #060607;
      --text-soft: #4f5660;
      --accent: #5865f2;
      --accent-soft: #eef0ff;
      --border: #d4d7dc;
      --card-radius: 18px;
      --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1f22;
        --bg-alt: #313338;
        --bg-soft: #2b2d31;
        --text: #f2f3f5;
        --text-soft: #b5bac1;
        --accent: #5865f2;
        --accent-soft: rgba(88, 101, 242, 0.12);
        --border: #3f4147;
        --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.6);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, var(--bg-soft) 0, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
      max-width: 1120px;
      margin: 0 auto;
    }

    .card {
      background: var(--bg-alt);
      border-radius: var(--card-radius);
      padding: 16px 18px 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease-out both;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--text-soft);
      margin-top: 2px;
    }

    .badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-soft);
    }

    .badge.gold {
      border-color: gold;
      color: gold;
      background: rgba(255, 215, 0, 0.12);
    }

    .badge.silver {
      border-color: silver;
      color: silver;
      background: rgba(192, 192, 192, 0.12);
    }

    .badge.bronze {
      border-color: #cd7f32;
      color: #cd7f32;
      background: rgba(205, 127, 50, 0.12);
    }

    .join-btn {
      display: inline-block;
      margin-top: 12px;
      background: var(--accent);
      color: white;
      padding: 8px 14px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: 0.18s;
    }

    .join-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(88, 101, 242, 0.7);
    }

    .no-invite {
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-soft);
      opacity: 0.7;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <h1>🏆 Top Bumps – AdminBot</h1>

  <div id="grid" class="grid">
    <p style="text-align:center; opacity:0.7;">Chargement…</p>
  </div>

  <script>
    const API_URL = "https://TON-PROJET.railway.app/api/top-bumps";

    async function loadTop() {
      const grid = document.getElementById("grid");

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        grid.innerHTML = "";

        data.forEach(server => {
          const card = document.createElement("article");
          card.className = "card";

          let badgeClass = "";
          if (server.position === 1) badgeClass = "gold";
          if (server.position === 2) badgeClass = "silver";
          if (server.position === 3) badgeClass = "bronze";

          card.innerHTML = `
            <div class="card-header">
              <div>
                <div class="card-title">${server.name}</div>
                <div class="card-subtitle">#${server.position} · ${server.bumps} bumps</div>
              </div>
              <span class="badge ${badgeClass}">#${server.position}</span>
            </div>

            ${
              server.invite
                ? `<a href="${server.invite}" target="_blank" class="join-btn">Rejoindre</a>`
                : `<div class="no-invite">Aucune invite disponible</div>`
            }
          `;

          grid.appendChild(card);
        });

      } catch (err) {
        grid.innerHTML = `<p style="text-align:center; opacity:0.7;">Impossible de charger les données.</p>`;
      }
    }

    loadTop();
    setInterval(loadTop, 30000);
  </script>

</body>
</html>
