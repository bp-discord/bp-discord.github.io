<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Top Bumps – AdminBot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #f2f3f5;
      --bg-alt: #ffffff;
      --bg-soft: #e3e5e8;
      --text: #060607;
      --text-soft: #4f5660;
      --accent: #5865f2;
      --accent-soft: #eef0ff;
      --border: #d4d7dc;
      --card-radius: 18px;
      --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1f22;
        --bg-alt: #313338;
        --bg-soft: #2b2d31;
        --text: #f2f3f5;
        --text-soft: #b5bac1;
        --accent: #5865f2;
        --accent-soft: rgba(88, 101, 242, 0.12);
        --border: #3f4147;
        --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.6);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, var(--bg-soft) 0, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.12), transparent 70%);
      padding: 10px 0 6px;
    }

    .header-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 0, #ffffff, #5865f2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-weight: 800;
      font-size: 18px;
      box-shadow: 0 10px 25px rgba(88, 101, 242, 0.7);
    }

    .brand-text-title {
      font-size: 16px;
      font-weight: 700;
    }

    .brand-text-sub {
      font-size: 12px;
      color: var(--text-soft);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border-radius: 999px;
      border: none;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      transition: all 0.18s ease;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 12px 30px rgba(88, 101, 242, 0.7);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 40px rgba(88, 101, 242, 0.9);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-soft);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    /* PAGE */
    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 20px;
      text-align: center;
    }

    /* GRID */
    .main-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    /* CARD */
    .card {
      background: var(--bg-alt);
      border-radius: var(--card-radius);
      padding: 16px 18px 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      animation: fadeUp 0.6s ease-out both;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--text-soft);
      margin-top: 2px;
    }

    .badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-soft);
    }

    .gold { border-color: gold; color: gold; background: rgba(255, 215, 0, 0.12); }
    .silver { border-color: silver; color: silver; background: rgba(192, 192, 192, 0.12); }
    .bronze { border-color: #cd7f32; color: #cd7f32; background: rgba(205, 127, 50, 0.12); }

    .join-btn {
      display: inline-block;
      margin-top: 12px;
      background: var(--accent);
      color: white;
      padding: 8px 14px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: 0.18s;
    }

    .join-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(88, 101, 242, 0.7);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <!-- HEADER IDENTIQUE AU DASHBOARD -->
  <div class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-logo">A</div>
        <div>
          <div class="brand-text-title">AdminBot Panel</div>
          <div class="brand-text-sub">Gestion avancée de votre serveur Discord</div>
        </div>
      </div>

      <div class="header-actions">
        <a class="btn btn-ghost" href="https://discord.gg/TcK65JDaaC" target="_blank">Serveur BlocPlay</a>
        <a class="btn btn-primary" href="https://discord.com" target="_blank">—
