<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AdminBot Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { margin:0; font-family:"Segoe UI"; background:#1e1f22; color:#fff; }
    header { background:#5865f2; padding:20px; text-align:center; font-size:26px; font-weight:700; }
    .container { max-width:900px; margin:40px auto; padding:20px; }
    .card { background:#2b2d31; padding:20px; border-radius:12px; border:1px solid #3a3c41; margin-bottom:20px; }
    .section-title { font-size:18px; margin-bottom:10px; }
    .setting { margin-bottom:8px; color:#ccc; }
</style>
</head>
<body>

<header>AdminBot — Panel</header>

<div class="container">

    <div class="card">
        <div class="section-title">Paramètres du bot</div>
        <div class="setting">Langue : Français</div>
        <div class="setting">Fuseau horaire : UTC+02:00</div>
        <div class="setting">Panel : https://bp-discord.github.io/adminbot/pannel</div>
    </div>

    <div class="card">
        <div class="section-title">Commandes disponibles</div>
        <ul>
            <li>/mod</li>
            <li>/clear</li>
            <li>/move</li>
            <li>/giveway</li>
            <li>/createchannel</li>
            <li>/config</li>
        </ul>
    </div>

</div>

</body>
</html>
