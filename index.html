<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>BP Discord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon global -->
  <link rel="icon" type="image/x-icon" href="/logo.ico">

  <style>
    :root {
      --bg: #f2f3f5;
      --bg-alt: #ffffff;
      --bg-soft: #e3e5e8;
      --text: #060607;
      --text-soft: #4f5660;
      --accent: #5865f2;
      --accent-soft: #eef0ff;
      --border: #d4d7dc;
      --card-radius: 18px;
      --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1f22;
        --bg-alt: #313338;
        --bg-soft: #2b2d31;
        --text: #f2f3f5;
        --text-soft: #b5bac1;
        --accent: #5865f2;
        --accent-soft: rgba(88, 101, 242, 0.12);
        --border: #3f4147;
        --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.6);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, var(--bg-soft) 0, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER GLOBAL */
    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.12), transparent 70%);
      padding: 10px 0 6px;
    }

    .header-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      overflow: hidden;
      background: radial-gradient(circle at 30% 0, #ffffff, #5865f2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: white;
      box-shadow: 0 10px 25px rgba(88, 101, 242, 0.7);
    }

    .brand-text-title {
      font-size: 16px;
      font-weight: 700;
    }

    .brand-text-sub {
      font-size: 12px;
      color: var(--text-soft);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.18s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 12px 30px rgba(88, 101, 242, 0.7);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 40px rgba(88, 101, 242, 0.9);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-soft);
      border: 1px solid var(--border);
    }

    /* PAGE */
    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 40px 16px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 30px;
    }

    /* GRID */
    .main-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    /* CARD */
    .card {
      background: var(--bg-alt);
      border-radius: var(--card-radius);
      padding: 20px 22px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      animation: fadeUp 0.6s ease-out both;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 13px;
      color: var(--text-soft);
      margin-bottom: 14px;
    }

    .card-actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-small {
      padding: 7px 12px;
      font-size: 12px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <!-- HEADER GLOBAL -->
  <div class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-logo">B</div>
        <div>
          <div class="brand-text-title">BP Discord</div>
          <div class="brand-text-sub">BP Pannel officiel</div>
        </div>
      </div>

      <div class="header-actions">
        <a class="btn btn-primary" href="/">Accueil</a>
      </div>
    </div>
  </div>

  <!-- PAGE -->
  <div class="page">

    <h1>BP Discord</h1>
    <div class="subtitle">1 pannel à gérer, 2 bots à disponibilité.</div>

    <section class="main-grid">

      <!-- ADMINBOT -->
      <article class="card">
        <div class="card-title">AdminBot</div>
        <div class="card-subtitle">Modération, gestion, outils avancés et panel premium.</div>

        <div class="card-actions">
          <a href="/adminbot/dashboard" class="btn btn-primary btn-small">Ouvrir le panel</a>
          <a href="/adminbot" class="btn btn-ghost btn-small">Présentation</a>
        </div>
      </article>

      <!-- BLOCPLAY BOT -->
      <article class="card">
        <div class="card-title">BlocPlay Bot</div>
        <div class="card-subtitle">Système de niveaux, économie, mini‑jeux et outils communautaires.</div>

        <div class="card-actions">
          <a href="/blocplay/dashboard" class="btn btn-primary btn-small">Ouvrir le panel</a>
          <a href="/blocplay" class="btn btn-ghost btn-small">Présentation</a>
        </div>
      </article>

    </section>

  </div>

</body>
</html>
