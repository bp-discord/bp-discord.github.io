<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BP Discord — Accueil</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #1e1f22;
        color: #fff;
    }
    header {
        background: #2b2d31;
        padding: 20px;
        text-align: center;
        font-size: 24px;
        font-weight: 700;
        color: #fff;
        border-bottom: 1px solid #3a3c41;
    }
    .container {
        max-width: 900px;
        margin: 40px auto;
        padding: 20px;
    }
    .card {
        background: #2b2d31;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        border: 1px solid #3a3c41;
    }
    .card h2 {
        margin: 0 0 10px;
        font-size: 22px;
    }
    .btn {
        display: inline-block;
        margin-top: 10px;
        padding: 10px 18px;
        background: #5865f2;
        color: #fff;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
    }
    .btn:hover {
        background: #4752c4;
    }
</style>
</head>
<body>

<header>BP Discord — Multi‑Bot Panel</header>

<div class="container">

    <div class="card">
        <h2>AdminBot</h2>
        <p>Bot d'administration avancée : modération, gestion des salons, giveaways, configuration…</p>
        <a class="btn" href="/adminbot">Voir la présentation</a>
    </div>

    <div class="card">
        <h2>BlocPlay</h2>
        <p>Bot officiel de BlocPlay : systèmes internes, gestion du jeu, outils communautaires…</p>
        <a class="btn" href="/blocplay">Voir la présentation</a>
    </div>

</div>

</body>
</html>
