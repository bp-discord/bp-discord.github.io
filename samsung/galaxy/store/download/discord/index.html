<!DOCTYPE html>
<html lang="fr">
<head>

            justify-content: center;
            align-items: center;
            height: 100vh;

        .box {

        .btn {
            display: inline-block;
            padding: 12px 22px;
            background: #5865F2;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            background: #4752C4;
        }
