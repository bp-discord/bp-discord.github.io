<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BlocPlay Rules V2 Sender</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #2b2d31;
color: white;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100vh;
}

button {
padding: 14px 22px;
font-size: 16px;
border: none;
border-radius: 10px;
cursor: pointer;
background: #5865F2;
color: white;
}

button:hover {
background: #4752c4;
}
</style>
</head>

<body>

<h1>📜 BlocPlay - Envoi Règlement</h1>

<button onclick="sendRules()">Envoyer sur Discord</button>

<script>
async function sendRules() {

const webhook = "https://discord.com/api/webhooks/1505577752831725590/2lWtaz7pOSfd2YIs-iYPSg8izs7Pz1c08DJPib1nt65Kb7QVpA4V7kvqOzmJYbteQ1zB";

const payload = {
flags: 32768,
components: [
{
type: 17,
components: [
{
type: 10,
content: "# Rules"
},
{
type: 14
},
{
type: 10,
content: "### 1 •\n> Mentions of @everyone, @here or others are prohibited on this server."
},
{
type: 10,
content: "### 2 •\n> Prohibition of advertising for a website, bot, application, server, game or other things."
},
{
type: 10,
content: "Any rule that is not respected will be sanctioned according to the rule that was not respected."
},
{
type: 1,
components: [
{
type: 2,
style: 5,
label: "Accepter les règles",
url: "https://blocplay-beta.github.io/discord/rules/accept"
}
]
}
]
}
]
};

await fetch(webhook, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify(payload)
});

alert("Message envoyé !");
}

</script>

</body>
</html>
