<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BlocPlay+ V2</title>

<style>
body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:Arial;
}

button{
    background:#5865F2;
    color:white;
    border:none;
    padding:16px 30px;
    border-radius:14px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<button onclick="sendMessage()">Envoyer</button>

<script>
async function sendMessage() {

const webhook = "COLLE_TON_WEBHOOK_ICI";

await fetch(webhook + "?with_components=true", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },

    body: JSON.stringify({

        flags: 32768,

        components: [

            {
                type: 17,
                accent_color: 5793266,

                components: [

                    {
                        type: 10,
                        content:
`# 📜 Rules :

Caca nique ta mère sale fils de pute... abonnement qui vous propose pleins de fonctionnalités que vous ne pouvez pas louper :

> **Plus d'emplacements de contact sur BP Contact :**
> 80 sans abonnement / illimité avec l'abonnement

> **Plus d'espace de stockage sur BlocPlay Cloud :**
> 130 Ko de stockage sans abonnement / 300 Ko de stockage avec l'abonnement

> **Personnalisation de l'affichage de BP Contact et BP Discord :**
> garder le thème par défaut sans abonnement / possibilité de changer la couleur de fond, des boutons et du texte avec l'abonnement

## Et pleins d'autres avantages majeurs...`
                    },

                    {
                        type: 14,
                        divider: true,
                        spacing: 1
                    },

                    {
                        type: 1,
                        components: [
                            {
                                type: 2,
                                style: 5,
                                label: "Accept rules",
                                url: "https://blocplay-beta.github.io/discord/rules/accept"
                            }
                        ]
                    }

                ]
            }

        ]
    })
});

alert("Message Components V2 envoyé !");
}
</script>

</body>
</html>
