<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BlocPlay Règlement V2</title>

<style>
body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:Arial;
}

button{
    background:#5865F2;
    color:white;
    border:none;
    padding:16px 30px;
    border-radius:14px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<button onclick="sendMessage()">Envoyer les règles</button>

<script>
async function sendMessage() {

const webhook = "https://discord.com/api/webhooks/1505577752831725590/2lWtaz7pOSfd2YIs-iYPSg8izs7Pz1c08DJPib1nt65Kb7QVpA4V7kvqOzmJYbteQ1zB";

await fetch(webhook + "?with_components=true", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },

    body: JSON.stringify({

        flags: 32768,

        components: [

            {
                type: 17,
                accent_color: 5793266,

                components: [

                    {
                        type: 10,
                        content:
`# 📜 Règlement BlocPlay

### 1 •
> Mentions of @everyone, @here or others are prohibited on this server.

### 2 •
> Prohibition of advertising for a website, bot, application, server, game or other things.

---

Any rule that is not respected will be sanctioned according to the rule that was not respected.`
                    },

                    {
                        type: 14,
                        divider: true,
                        spacing: 1
                    },

                    {
                        type: 1,
                        components: [
                            {
                                type: 2,
                                style: 5,
                                label: "✅ Accepter les règles",
                                url: "https://blocplay-beta.github.io/discord/rules/accept"
                            }
                        ]
                    }

                ]
            }

        ]
    })
});

alert("Règles envoyées !");
}
</script>

</body>
</html>
