<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BlocPlay - Règlement</title>
<style>
body {
font-family: Arial;
background: #2b2d31;
color: white;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100vh;
}

button {
padding: 12px 20px;
font-size: 16px;
border: none;
border-radius: 8px;
cursor: pointer;
background: #5865F2;
color: white;
}

button:hover {
background: #4752c4;
}
</style>
</head>

<body>

<h1>📜 Envoyer les règles BlocPlay</h1>

<button onclick="sendRules()">Envoyer sur Discord</button>

<script>
async function sendRules() {

const webhook = "https://discord.com/api/webhooks/1505577752831725590/2lWtaz7pOSfd2YIs-iYPSg8izs7Pz1c08DJPib1nt65Kb7QVpA4V7kvqOzmJYbteQ1zB";

await fetch(webhook, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({

embeds: [
{
title: "Rules",
description:
`### 1 •
> Mentions of @everyone, @here or others are prohibited on this server.

### 2 •
> Prohibition of advertising for a website, bot, application, server, game or other things.

---

Any rule that is not respected will be sanctioned according to the rule that was not respected.`,
color: 3092790
}
],

components: [
{
type: 1,
components: [
{
type: 2,
style: 5,
label: "Accepter les règles",
url: "https://blocplay-beta.github.io/discord/rules/accept"
}
]
}
]

})
});

alert("Règles envoyées sur Discord !");
}
</script>

</body>
</html>
